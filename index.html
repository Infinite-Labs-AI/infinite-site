  <style>
    @font-face {
      font-family: "IBM Plex Sans";
      font-style: normal;
      font-display: swap;
      font-weight: 400;
      src: url("fonts/ibm-plex/ibm-plex-sans-400.ttf") format("truetype");
    }

    @font-face {
      font-family: "IBM Plex Sans";
      font-style: normal;
      font-display: swap;
      font-weight: 500;
      src: url("fonts/ibm-plex/ibm-plex-sans-500.ttf") format("truetype");
    }

    @font-face {
      font-family: "IBM Plex Sans";
      font-style: normal;
      font-display: swap;
      font-weight: 600;
      src: url("fonts/ibm-plex/ibm-plex-sans-600.ttf") format("truetype");
    }

    @font-face {
      font-family: "IBM Plex Sans";
      font-style: normal;
      font-display: swap;
      font-weight: 700;
      src: url("fonts/ibm-plex/ibm-plex-sans-700.ttf") format("truetype");
    }

    @font-face {
      font-family: "IBM Plex Mono";
      font-style: normal;
      font-display: swap;
      font-weight: 400;
      src: url("fonts/ibm-plex/ibm-plex-mono-400.ttf") format("truetype");
    }

    @font-face {
      font-family: "IBM Plex Mono";
      font-style: normal;
      font-display: swap;
      font-weight: 500;
      src: url("fonts/ibm-plex/ibm-plex-mono-500.ttf") format("truetype");
    }

    @font-face {
      font-family: "IBM Plex Mono";
      font-style: normal;
      font-display: swap;
      font-weight: 600;
      src: url("fonts/ibm-plex/ibm-plex-mono-600.ttf") format("truetype");
    }

    :root {
      --background: #000;
      --text: #f0f6fc;
      --foreground: #e7e5e4;
      --muted: #a8a29e;
      --dim: #768390;
      --secondary: rgba(68, 64, 60, 0.4);
      --secondary-hover: rgba(68, 64, 60, 0.7);
      --ring: rgba(120, 113, 108, 0.32);
      --heading: "IBM Plex Sans", system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      --body: "IBM Plex Sans", system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      --mono: "IBM Plex Mono", ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html {
      background: #000;
      scroll-behavior: smooth;
    }

    body {
      min-height: 100vh;
      overflow-x: hidden;
      background-color: #000;
      background-image: radial-gradient(ellipse 120% 80% at top, rgba(255, 255, 255, 0.08) 0%, rgba(16, 185, 129, 0.04) 38%, rgba(0, 0, 0, 0) 76%);
      background-repeat: no-repeat;
      background-size: 100% 100%;
      color: var(--foreground);
      font-family: var(--body);
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    button {
      border: 0;
      border-radius: 0;
      background: transparent;
      color: inherit;
      font: inherit;
    }

    img,
    svg {
      display: block;
      max-width: 100%;
    }

    .site-header {
      position: fixed;
      z-index: 50;
      top: 12px;
      right: 0;
      left: 0;
      width: 100%;
      max-width: 1480px;
      margin: 0 auto;
      border: 1px solid transparent;
      border-radius: 999px;
      background: transparent;
    }

    .nav-shell {
      padding: 12px 16px;
      border-radius: 999px;
      background: rgba(3, 7, 10, 0.18);
      backdrop-filter: blur(18px);
    }

    .nav {
      display: grid;
      grid-template-columns: minmax(150px, 1fr) auto minmax(150px, 1fr);
      align-items: center;
      gap: 24px;
    }

    .logo {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      flex: 0 0 auto;
      color: var(--foreground);
      font-size: 21px;
      font-weight: 400;
      line-height: 1;
      letter-spacing: -0.03em;
      text-transform: lowercase;
      justify-self: start;
    }

    .logo svg {
      display: none;
    }

    .logo-mark {
      width: 24px;
      height: 24px;
      border-radius: 6px;
      object-fit: cover;
      opacity: 0.82;
    }

    .logo-word {
      transform: translateY(-1px);
    }

    .footer-nav {
      grid-column: 2;
      display: flex;
      align-items: center;
      justify-self: center;
      font-family: var(--mono);
      font-size: 13px;
      letter-spacing: 0.05em;
      line-height: 1.2;
      color: var(--dim);
      text-align: center;
    }

    .footer-links {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: center;
      gap: 0;
    }

    .footer-nav a {
      color: var(--muted);
      text-decoration: none;
      transition: color 150ms ease, text-decoration-color 150ms ease;
      white-space: nowrap;
    }

    .footer-nav a:hover {
      color: var(--text);
    }

    .footer-nav .sep {
      margin: 0 16px;
      opacity: 0.5;
    }

    .footer-nav .icon-link {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      vertical-align: middle;
    }

    .footer-nav .icon-link svg {
      display: block;
      width: 14px;
      height: 14px;
    }

    .nav-links {
      display: flex;
      align-items: center;
      gap: 32px;
    }

    .nav-item {
      position: relative;
    }

    .nav-link,
    .nav-trigger {
      display: inline-flex;
      cursor: pointer;
      align-items: center;
      gap: 4px;
      color: var(--muted);
      font-size: 14px;
      font-weight: 400;
      line-height: 1.5;
      transition: color 180ms ease;
      white-space: nowrap;
    }

    .nav-link:hover,
    .nav-trigger:hover,
    .nav-item:focus-within .nav-trigger,
    .nav-item:hover .nav-trigger {
      color: var(--foreground);
    }

    .chevron {
      width: 12px;
      height: 12px;
      color: currentColor;
      transition: transform 180ms ease;
    }

    .nav-item:hover .chevron,
    .nav-item:focus-within .chevron {
      transform: rotate(180deg);
    }

    .dropdown {
      position: fixed;
      z-index: 60;
      top: 80px;
      left: 50%;
      display: flex;
      gap: 8px;
      opacity: 0;
      pointer-events: none;
      transform: translateX(-50%) translateY(-4px);
      transition: opacity 240ms ease, transform 240ms ease;
    }

    .nav-item:hover .dropdown,
    .nav-item:focus-within .dropdown {
      opacity: 1;
      pointer-events: auto;
      transform: translateX(-50%) translateY(0);
    }

    .dropdown-card {
      display: flex;
      width: 270px;
      flex-direction: column;
      gap: 16px;
      overflow: hidden;
    }

    .dropdown-image {
      width: 100%;
      height: 280px;
      overflow: hidden;
      border-radius: 16px;
      background: var(--secondary);
      opacity: 0.8;
      transition: opacity 180ms ease;
    }

    .dropdown-card:hover .dropdown-image {
      opacity: 1;
    }

    .dropdown-image img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .dropdown-copy {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .dropdown-title {
      font-family: var(--heading);
      font-size: 28px;
      font-weight: 700;
      letter-spacing: -0.02em;
      line-height: 1.05;
      color: var(--foreground);
    }

    .dropdown-text {
      color: var(--muted);
      font-size: 14px;
      line-height: 1.45;
    }

    .nav-cta,
    .hero-cta {
      display: inline-flex;
      cursor: pointer;
      align-items: center;
      justify-content: center;
      gap: 8px;
      border-radius: 999px;
      font-size: 14px;
      font-weight: 700;
      line-height: 1.5;
      outline: none;
      transition: background 180ms ease, box-shadow 180ms ease, transform 180ms ease;
      white-space: nowrap;
    }

    .nav-cta {
      justify-self: end;
      height: 36px;
      padding: 0 18px;
      border: 1px solid rgba(245, 245, 244, 0.14);
      background: rgba(250, 250, 249, 0.08);
      color: #f5f5f4;
      backdrop-filter: blur(16px);
    }

    .nav-cta:hover {
      background: rgba(250, 250, 249, 0.14);
    }

    .nav-cta:focus-visible,
    .hero-cta:focus-visible {
      box-shadow: 0 0 0 2px var(--ring);
    }

    .mobile-menu {
      display: none;
      border-radius: 8px;
      padding: 8px;
      color: var(--foreground);
    }

    .hero {
      position: relative;
      display: flex;
      height: 100vh;
      height: 100svh;
      flex-direction: column;
      overflow: clip;
      padding-top: 64px;
      background: #000;
    }

    .hero::before {
      position: absolute;
      z-index: 0;
      inset: 0;
      content: "";
      background:
        radial-gradient(circle at 50% 42%, rgba(255, 255, 255, 0.1), transparent 24%),
        radial-gradient(circle at 50% 44%, rgba(0, 0, 0, 0.24), transparent 38%);
    }

    .hero::after {
      position: absolute;
      z-index: 4;
      inset: 0;
      pointer-events: none;
      content: "";
      background:
        linear-gradient(180deg, rgba(0, 0, 0, 0.58) 0%, rgba(0, 0, 0, 0.22) 28%, rgba(0, 0, 0, 0.02) 58%, rgba(0, 0, 0, 0.74) 100%),
        radial-gradient(ellipse at 50% 37%, rgba(0, 0, 0, 0.12) 0%, rgba(0, 0, 0, 0.2) 34%, rgba(0, 0, 0, 0.38) 100%),
        linear-gradient(90deg, rgba(0, 0, 0, 0.56), rgba(0, 0, 0, 0) 24%, rgba(0, 0, 0, 0) 76%, rgba(0, 0, 0, 0.56));
    }

    .hero-bg {
      position: absolute;
      z-index: 0;
      inset: 0;
      width: 100%;
      height: 100%;
      max-width: none;
      object-fit: cover;
      object-position: center;
      opacity: 0;
      filter: brightness(1.32) contrast(1.08);
      transform: scale(1.12) translateY(26%);
      transform-origin: center center;
      transition: opacity 420ms ease, transform 900ms ease;
    }

    .hero[data-space-variant="cruiser"] .hero-bg[data-hero-variant="cruiser"] {
      opacity: 1;
      transform: scale(1.2) translateY(26%);
    }

    .hero[data-space-variant="freighter"] .hero-bg[data-hero-variant="freighter"] {
      opacity: 1;
      transform: scale(1.18) translateY(28%);
    }

    .hero[data-space-variant="interceptor"] .hero-bg[data-hero-variant="interceptor"] {
      opacity: 1;
      transform: scale(1.24) translateY(34%);
    }

    .hero[data-space-variant="freighter"] .hero-bg[data-hero-variant="freighter"] {
      object-position: center 52%;
    }

    .hero[data-space-variant="interceptor"] .hero-bg[data-hero-variant="interceptor"] {
      object-position: center 48%;
    }

    .hero-inner {
      position: relative;
      display: flex;
      width: 100%;
      max-width: 1512px;
      flex: 1;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 28px;
      margin: 0 auto;
      padding: 80px 40px 174px;
    }

    .hero-copy {
      position: relative;
      z-index: 10;
      display: flex;
      width: 100%;
      flex-direction: column;
      align-items: center;
      text-align: center;
      text-shadow: 0 2px 22px rgba(0, 0, 0, 0.68);
    }

    .hero-copy::before {
      position: absolute;
      z-index: -1;
      inset: -26px 50%;
      width: min(760px, 86vw);
      border-radius: 999px;
      background: radial-gradient(ellipse at center, rgba(0, 0, 0, 0.34) 0%, rgba(0, 0, 0, 0.24) 42%, transparent 72%);
      content: "";
      transform: translateX(-50%);
    }

    h1 {
      max-width: 1040px;
      color: var(--foreground);
      font-family: var(--heading);
      font-size: clamp(54px, 6.2vw, 90px);
      font-weight: 400;
      letter-spacing: 0;
      line-height: 0.95;
      text-wrap: balance;
    }

    .hero-word,
    .hero-fade {
      opacity: 0;
      animation: hero-rise 350ms cubic-bezier(0.16, 1, 0.3, 1) forwards;
      animation-delay: var(--hero-delay, 0s);
    }

    .hero-word {
      display: inline-block;
    }

    .hero-subtitle {
      max-width: 480px;
      margin-top: 16px;
      color: rgba(245, 245, 244, 0.9);
      font-size: 14px;
      font-weight: 400;
      line-height: 1.43;
      text-wrap: balance;
    }

    .hero-cta-wrap {
      margin-top: 18px;
    }

    .hero-cta {
      height: 44px;
      padding: 0 20px;
      background: #fafaf9;
      color: #1c1917;
      box-shadow: 0 18px 54px rgba(0, 0, 0, 0.34);
    }

    .hero-cta:hover {
      background: rgba(250, 250, 249, 0.9);
      transform: translateY(-1px);
    }

    .hero-product {
      position: absolute;
      z-index: 8;
      display: none;
      right: 50%;
      bottom: 42px;
      width: min(1010px, 62vw);
      opacity: 0.82;
      pointer-events: none;
      transform: translateX(50%) perspective(860px) rotateX(58deg) translateY(48%);
      transform-origin: center bottom;
      filter: drop-shadow(0 42px 58px rgba(0, 0, 0, 0.55));
      -webkit-mask-image: linear-gradient(to bottom, rgba(0, 0, 0, 0.92) 0%, rgba(0, 0, 0, 0.76) 48%, transparent 100%);
      mask-image: linear-gradient(to bottom, rgba(0, 0, 0, 0.92) 0%, rgba(0, 0, 0, 0.76) 48%, transparent 100%);
    }

    .hero-product img {
      width: 100%;
      height: auto;
      border: 1px solid rgba(255, 255, 255, 0.16);
      border-radius: 18px;
      background: rgba(0, 0, 0, 0.36);
    }

    .hero-variant-switcher {
      position: absolute;
      z-index: 12;
      bottom: 72px;
      left: 40px;
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 4px;
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 999px;
      background: rgba(3, 7, 10, 0.5);
      box-shadow: 0 16px 44px rgba(0, 0, 0, 0.34);
      backdrop-filter: blur(18px);
    }

    .hero-variant {
      display: inline-flex;
      min-width: 88px;
      height: 34px;
      cursor: pointer;
      align-items: center;
      justify-content: center;
      border-radius: 999px;
      color: rgba(231, 229, 228, 0.72);
      font-family: var(--mono);
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.04em;
      line-height: 1;
      transition: background 160ms ease, color 160ms ease, box-shadow 160ms ease;
      white-space: nowrap;
    }

    .hero-variant:hover {
      color: #fff;
    }

    .hero-variant[aria-pressed="true"] {
      background: rgba(250, 250, 249, 0.94);
      color: #111827;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.28);
    }

    .hero-variant:focus-visible {
      outline: none;
      box-shadow: 0 0 0 2px var(--ring);
    }

    .hero-footer {
      position: absolute;
      z-index: 12;
      right: 40px;
      bottom: 22px;
      left: 40px;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: center;
      gap: 10px;
      color: rgba(168, 162, 158, 0.82);
      font-family: var(--mono);
      font-size: 12px;
      letter-spacing: 0.045em;
      line-height: 1.3;
      pointer-events: auto;
      text-align: center;
      text-shadow: 0 1px 12px rgba(0, 0, 0, 0.9);
    }

    .hero-footer a {
      color: rgba(214, 211, 209, 0.92);
      text-decoration: underline;
      text-decoration-color: rgba(255, 255, 255, 0.24);
      text-underline-offset: 2px;
      transition: color 150ms ease, text-decoration-color 150ms ease;
      white-space: nowrap;
    }

    .hero-footer a:hover {
      color: var(--text);
      text-decoration-color: rgba(255, 255, 255, 0.5);
    }

    .hero-footer .sep {
      color: rgba(120, 113, 108, 0.74);
    }

    .hero-footer-meta {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }

    .hero-social {
      display: none;
      order: -1;
      align-items: center;
      justify-content: center;
      gap: 22px;
    }

    .hero-social a {
      display: inline-flex;
      color: rgba(214, 211, 209, 0.92);
      text-decoration: none;
    }

    .hero-social svg {
      width: 19px;
      height: 19px;
    }

    .space-horizon {
      position: absolute;
      pointer-events: none;
      max-width: none;
      z-index: 1;
      right: 50%;
      bottom: -88px;
      width: min(2880px, 164vw);
      height: auto;
      opacity: 0.76;
      transform: translateX(50%);
      -webkit-mask-image: linear-gradient(to bottom, transparent 0%, #000 38%);
      mask-image: linear-gradient(to bottom, transparent 0%, #000 38%);
    }

    @keyframes hero-rise {
      from {
        opacity: 0;
        transform: translateY(8px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @media (prefers-reduced-motion: reduce) {
      .hero-word,
      .hero-fade {
        opacity: 1;
        animation: none;
      }
    }

    @media (max-width: 1024px) {
      .nav-links {
        gap: 20px;
      }

      .space-horizon {
        bottom: -78px;
        width: 176vw;
      }
    }

    @media (max-width: 767px) {
      .site-header {
        top: 6px;
      }

      .nav-shell {
        padding: 10px 16px;
      }

      .nav {
        grid-template-columns: 1fr;
        gap: 0;
      }

      .logo {
        gap: 7px;
        font-size: 22px;
        justify-self: center;
      }

      .logo-mark {
        width: 24px;
        height: 24px;
      }

      /* Collapse the desktop nav to just the wordmark; socials + CTA
         move into the hero (footer + hero CTA) so the bar isn't crammed. */
      .footer-nav,
      .nav-cta,
      .mobile-menu {
        display: none;
      }

      .hero {
        height: 100vh;
        height: 100svh;
        min-height: 100svh;
        overflow: clip;
        padding-top: 56px;
      }

      .hero-inner {
        flex: 0 0 auto;
        justify-content: flex-start;
        gap: 46px;
        height: 100%;
        min-height: 0;
        padding: 76px 14px 184px;
      }

      .hero[data-space-variant="cruiser"] .hero-bg[data-hero-variant="cruiser"] {
        transform: scale(1.88) translateY(22%);
      }

      .hero[data-space-variant="freighter"] .hero-bg[data-hero-variant="freighter"] {
        transform: scale(1.74) translateY(24%);
      }

      .hero[data-space-variant="interceptor"] .hero-bg[data-hero-variant="interceptor"] {
        transform: scale(1.92) translateY(25%);
      }

      .hero-copy::before {
        inset: -18px 50% -28px;
        width: min(390px, 96vw);
        background: radial-gradient(ellipse at center, rgba(0, 0, 0, 0.58) 0%, rgba(0, 0, 0, 0.36) 54%, transparent 78%);
      }

      h1 {
        width: auto;
        max-width: 360px;
        font-size: clamp(31px, 9.2vw, 40px);
        line-height: 1.08;
      }

      .hero-subtitle {
        max-width: 320px;
        margin-top: 14px;
      }

      .hero-cta-wrap {
        margin-top: 22px;
      }

      .hero-product {
        bottom: 102px;
        width: 132vw;
        opacity: 0.62;
        transform: translateX(50%) perspective(760px) rotateX(61deg) translateY(52%);
      }

      .hero-footer {
        right: 16px;
        bottom: 18px;
        left: 16px;
        margin-top: 0;
        padding: 0 24px 28px;
        flex-direction: column;
        gap: 14px;
        font-size: 11px;
        letter-spacing: 0.02em;
      }

      .hero-social {
        display: flex;
      }

      .hero-variant-switcher {
        right: 50%;
        bottom: 126px;
        left: auto;
        transform: translateX(50%);
      }

      .hero-variant {
        min-width: 78px;
        height: 32px;
        font-size: 10px;
      }

      .space-horizon {
        bottom: -38px;
        width: 210vw;
      }
    }
  </style>
</head>
<body>
  <header class="site-header">
