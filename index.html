    }

    @font-face {

      font-display: swap;
      font-weight: 600;

    @font-face {
      font-family: "IBM Plex Sans";
      font-style: normal;
      font-display: swap;
      font-weight: 700;
      src: url("fonts/ibm-plex/ibm-plex-sans-700.ttf") format("truetype");
    }

    @font-face {
      font-family: "IBM Plex Mono";

      font-display: swap;
      font-weight: 400;
      src: url("fonts/ibm-plex/ibm-plex-mono-400.ttf") format("truetype");
    }

    @font-face {
      font-family: "IBM Plex Mono";
      font-style: normal;
      font-display: swap;
      font-weight: 500;
      src: url("fonts/ibm-plex/ibm-plex-mono-500.ttf") format("truetype");
    }

    @font-face {
      font-family: "IBM Plex Mono";
      font-style: normal;
      font-display: swap;
      font-weight: 600;
      src: url("fonts/ibm-plex/ibm-plex-mono-600.ttf") format("truetype");
    }

    :root {
      --foreground: #f5f5f4;
      --muted: rgba(245, 245, 244, 0.74);
      --dim: rgba(245, 245, 244, 0.56);
      --ring: rgba(245, 245, 244, 0.3);
      --heading: "IBM Plex Sans", system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      --body: "IBM Plex Sans", system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      --mono: "IBM Plex Mono", ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html {
      background: #000;
      scroll-behavior: smooth;
    }

    body {
      min-height: 100vh;
      overflow-x: hidden;
      background: #000;
      color: var(--foreground);
      font-family: var(--body);
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    img,
    svg {
      display: block;
      max-width: 100%;
    }

    .site-header {
      position: fixed;
      z-index: 40;
      top: 18px;
      right: 0;
      left: 0;
      width: 100%;
      max-width: 1512px;
      margin: 0 auto;
      padding: 0 28px;
      pointer-events: none;
    }

    .nav {
      display: grid;
      grid-template-columns: minmax(150px, 1fr) auto minmax(150px, 1fr);
      align-items: center;
      gap: 22px;
      pointer-events: auto;
    }

    .logo {
      display: inline-flex;
      align-items: center;
      justify-self: start;
      gap: 8px;
      color: var(--foreground);
      font-size: 21px;
      font-weight: 400;
      letter-spacing: 0;
      line-height: 1;
      text-transform: lowercase;
      text-shadow: 0 1px 18px rgba(0, 0, 0, 0.82);
    }

    .logo-word {
      transform: translateY(-1px);
    }

    .footer-nav {
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--dim);
      font-family: var(--mono);
      font-size: 13px;
      letter-spacing: 0.05em;
      line-height: 1.2;
      text-align: center;
    }

    .footer-links {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0;
      padding: 9px 15px;
      border: 1px solid rgba(255, 255, 255, 0.07);
      border-radius: 999px;
      background: rgba(0, 0, 0, 0.12);
      backdrop-filter: blur(14px);
    }

    .footer-nav a,
    .hero-footer a {
      color: rgba(245, 245, 244, 0.82);
      transition: color 150ms ease, text-decoration-color 150ms ease;
      white-space: nowrap;
    }

    .footer-nav a:hover,
    .hero-footer a:hover {
      color: #fff;
    }

    .footer-nav .sep {
      margin: 0 16px;
      opacity: 0.42;
    }

    .icon-link {
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }

    .icon-link svg {
      width: 14px;
      height: 14px;
    }

    .nav-cta,
    .hero-cta {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      border-radius: 999px;
      font-size: 14px;
      font-weight: 700;
      line-height: 1.5;
      outline: none;
      transition: background 180ms ease, box-shadow 180ms ease, transform 180ms ease;
      white-space: nowrap;
    }

    .nav-cta {
      justify-self: end;
      min-height: 38px;
      padding: 0 18px;
      border: 1px solid rgba(245, 245, 244, 0.22);
      background: rgba(250, 250, 249, 0.94);
      box-shadow: 0 14px 44px rgba(0, 0, 0, 0.26);
      color: #171717;
    }

    .nav-cta:hover,
    .hero-cta:hover {
      background: rgba(255, 255, 255, 1);
      transform: translateY(-1px);
    }

    .nav-cta:focus-visible,
    .hero-cta:focus-visible {
      box-shadow: 0 0 0 2px var(--ring);
    }

    .hero {
      position: relative;
      min-height: 100vh;
      min-height: 100svh;
      overflow: clip;
      background: #000;
      isolation: isolate;
    }

    .hero-background {
      position: absolute;
      z-index: -3;
      inset: 0;
      width: 100%;
      height: 100%;
      max-width: none;
      object-fit: cover;
      object-position: center;
      filter: brightness(0.92) contrast(1.08) saturate(0.96);
    }

    .hero::before {
      position: absolute;
      z-index: -2;
      inset: 0;
      pointer-events: none;
      content: "";
      background:
        radial-gradient(ellipse at 50% 43%, rgba(0, 0, 0, 0) 0%, rgba(0, 0, 0, 0.2) 41%, rgba(0, 0, 0, 0.66) 100%),
        linear-gradient(180deg, rgba(0, 0, 0, 0.58) 0%, rgba(0, 0, 0, 0.18) 24%, rgba(0, 0, 0, 0.05) 58%, rgba(0, 0, 0, 0.88) 100%),
        linear-gradient(90deg, rgba(0, 0, 0, 0.72), rgba(0, 0, 0, 0.08) 24%, rgba(0, 0, 0, 0.08) 76%, rgba(0, 0, 0, 0.72));
    }

    .hero::after {
      position: absolute;
      z-index: -1;
      inset: 0;
      pointer-events: none;
      content: "";
      background:
        radial-gradient(ellipse 44% 31% at 50% 38%, rgba(0, 0, 0, 0.68) 0%, rgba(0, 0, 0, 0.48) 42%, rgba(0, 0, 0, 0) 74%),
        linear-gradient(180deg, rgba(0, 0, 0, 0) 0%, rgba(0, 0, 0, 0) 71%, rgba(0, 0, 0, 0.92) 100%);
    }

    .hero-inner {
      position: relative;
      display: flex;
      min-height: 100vh;
      min-height: 100svh;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 112px 24px 142px;
      text-align: center;
    }

    .hero-copy {
      width: min(760px, 100%);
      transform: translateY(-18px);
      text-shadow: 0 3px 28px rgba(0, 0, 0, 0.86);
    }

    h1 {
      color: var(--foreground);
      font-family: var(--heading);
      font-size: clamp(44px, 4.6vw, 70px);
      font-weight: 400;
      letter-spacing: 0;
      line-height: 1.04;
      text-wrap: balance;
    }

    .hero-line {
      display: block;
    }

    .hero-em {
      font-style: italic;
    }

    .hero-cta-wrap {
      display: flex;
      justify-content: center;
      margin-top: 34px;
    }

    .hero-cta {
      min-height: 50px;
      padding: 0 25px;
      background: #fafaf9;
      box-shadow: 0 22px 70px rgba(0, 0, 0, 0.44);
      color: #171717;
    }

    .hero-built-ins {
      position: absolute;
      z-index: 12;
      right: 24px;
      bottom: 76px;
      left: 24px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 18px;
      color: rgba(245, 245, 244, 0.86);
      text-shadow: 0 2px 18px rgba(0, 0, 0, 0.9);
    }

    .built-in-title {
      color: rgba(245, 245, 244, 0.62);
      font-family: var(--mono);
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.24em;
    }

    .built-in-grid {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: center;
      gap: 18px 34px;
      max-width: 760px;
    }

    .built-in-item {
      display: inline-flex;
      align-items: center;
      gap: 9px;
      color: rgba(255, 255, 255, 0.9);
      font-size: 13px;
      font-weight: 500;
      line-height: 1;
      white-space: nowrap;
    }

    .built-in-item svg {
      width: 18px;
      height: 18px;
      color: #fff;
    }

    .hero-footer {
      position: absolute;
      z-index: 12;
      right: 24px;
      bottom: 22px;
      left: 24px;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: center;
      gap: 10px;
      color: rgba(168, 162, 158, 0.82);
      font-family: var(--mono);
      font-size: 12px;
      letter-spacing: 0.045em;
      line-height: 1.3;
      text-align: center;
      text-shadow: 0 1px 12px rgba(0, 0, 0, 0.9);
    }

    .hero-footer a {
      text-decoration: underline;
      text-decoration-color: rgba(255, 255, 255, 0.24);
      text-underline-offset: 2px;
    }

    .hero-footer .sep {
      color: rgba(120, 113, 108, 0.74);
    }

    .demo-modal {
      width: min(820px, calc(100vw - 32px));
      margin: auto;
      padding: 0;
      border: 1px solid rgba(255, 255, 255, 0.14);
      border-radius: 8px;
      background: rgba(5, 5, 5, 0.92);
      box-shadow: 0 30px 90px rgba(0, 0, 0, 0.68);
      color: var(--foreground);
      backdrop-filter: blur(22px);
    }

    .demo-modal::backdrop {
      background: rgba(0, 0, 0, 0.68);
      backdrop-filter: blur(8px);
    }

    .demo-panel {
      position: relative;
      display: grid;
      gap: 14px;
      padding: 24px;
    }

    .demo-copy {
      display: grid;
      gap: 4px;
      margin: 2px 42px 2px 0;
    }

    .demo-title {
      color: #fff;
      font-size: 22px;
      font-weight: 500;
      line-height: 1.12;
      letter-spacing: 0;
    }

    .demo-note {
      color: rgba(245, 245, 244, 0.58);
      font-size: 13px;
      line-height: 1.45;
    }

    .demo-close {
      position: absolute;
      top: 10px;
      right: 10px;
      display: inline-flex;
      width: 32px;
      height: 32px;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      border-radius: 999px;
      color: rgba(245, 245, 244, 0.66);
      font-size: 22px;
      line-height: 1;
    }

    .demo-close:hover,
    .demo-close:focus-visible {
      background: rgba(255, 255, 255, 0.08);
      color: #fff;
    }

    .calendar-shell {
      overflow: hidden;
      width: 100%;
      height: min(650px, 72vh);
      border: 1px solid rgba(255, 255, 255, 0.14);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.06);
    }

    .calendar-frame {
      width: 100%;
      height: 100%;
      border: 0;
      background: #fff;
    }

    .calendar-fallback {
      display: inline-flex;
      min-height: 44px;
      align-items: center;
      justify-content: center;
      justify-self: start;
      padding: 0 17px;
      border: 1px solid rgba(245, 245, 244, 0.2);
      border-radius: 999px;
      background: rgba(250, 250, 249, 0.94);
      color: #171717;
      font-size: 13px;
      font-weight: 700;
    }

    .calendar-fallback:hover,
    .calendar-fallback:focus-visible {
      background: #fff;
    }

    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
    }

    @media (max-width: 767px) {
      .site-header {
        top: 8px;
        padding: 0 14px;
      }

      .nav {
        grid-template-columns: 1fr;
      }

      .logo {
        justify-self: center;
        font-size: 22px;
      }

      .footer-nav,
      .nav-cta {
        display: none;
      }

      .hero-background {
        object-position: center;
      }

      .hero-inner {
        justify-content: flex-start;
        padding: 116px 18px 226px;
      }

      .hero-copy {
        transform: none;
      }

      h1 {
        max-width: 360px;
        margin: 0 auto;
        font-size: clamp(34px, 9.2vw, 44px);
        line-height: 1.04;
      }

      .hero-cta {
        min-height: 48px;
      }

      .hero-built-ins {
        bottom: 104px;
        gap: 13px;
      }

      .built-in-title {
        font-size: 9px;
      }

      .built-in-grid {
        max-width: 340px;
        gap: 12px 18px;
      }

      .built-in-item {
        font-size: 11px;
      }

      .built-in-item svg {
        width: 14px;
        height: 14px;
      }

      .hero-footer {
        right: 20px;
        bottom: 16px;
        left: 20px;
        flex-direction: row;
        gap: 6px 10px;
        font-size: 11px;
        line-height: 1.25;
      }

      .demo-panel {
        padding: 18px;
      }

      .calendar-shell {
        height: min(600px, 68vh);
      }
    }
  </style>
</head>

        <iframe class="calendar-frame" src="https://calendar.app.google/QtpCpF9hVrKUnZDF6" title="Book a demo call" loading="lazy"></iframe>
      </div>
      <a class="calendar-fallback" href="https://calendar.app.google/QtpCpF9hVrKUnZDF6" target="_blank" rel="noopener noreferrer">Open calendar</a>
    </div>
  </dialog>
  <script>
    const demoModal = document.querySelector("#demo-modal");
    const openDemoButtons = document.querySelectorAll("[data-open-demo]");
    const closeDemoButton = document.querySelector("[data-close-demo]");

    openDemoButtons.forEach((button) => {
      button.addEventListener("click", () => {
        demoModal.showModal();
        closeDemoButton.focus();
      });
    });

    closeDemoButton.addEventListener("click", () => {
      demoModal.close();
    });

    demoModal.addEventListener("click", (event) => {
      if (event.target === demoModal) demoModal.close();
    });
  </script>
</body>
</html>
