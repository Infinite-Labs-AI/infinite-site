name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Prepare site
        env:
          POSTHOG_API_HOST: ${{ vars.VITE_POSTHOG_API_HOST }}
          POSTHOG_PROJECT_TOKEN: ${{ vars.VITE_POSTHOG_PROJECT_TOKEN }}
        run: |
          set -euo pipefail

          rm -rf dist
          mkdir -p dist
          cp -R index.html favicon-16.png favicon-32.png apple-touch-icon.png logo.png LICENSE dist/

          if [ -n "${POSTHOG_API_HOST}" ] && [ -n "${POSTHOG_PROJECT_TOKEN}" ]; then
            node <<'NODE'
          const fs = require("node:fs");

          const indexPath = "dist/index.html";
          const html = fs.readFileSync(indexPath, "utf8");
          const projectToken = process.env.POSTHOG_PROJECT_TOKEN;
          const apiHost = process.env.POSTHOG_API_HOST;

          if (!projectToken || !apiHost) {
            process.exit(0);
          }

          const snippet = `  <script>
            !(function (t, e) {
              var o, n, p, r;
              e.__SV ||
                ((window.posthog = e),
                (e._i = []),
                (e.init = function (i, s, a) {
                  function g(t, e) {
                    var o = e.split(".");
                    2 == o.length && ((t = t[o[0]]), (e = o[1])),
                      (t[e] = function () {
                        t.push([e].concat(Array.prototype.slice.call(arguments, 0)));
                      });
                  }
                  ((p = t.createElement("script")).type = "text/javascript"),
                    (p.crossOrigin = "anonymous"),
                    (p.async = !0),
                    (p.src = s.api_host.replace(".i.posthog.com", "-assets.i.posthog.com") + "/static/array.js"),
                    (r = t.getElementsByTagName("script")[0]).parentNode.insertBefore(p, r);
                  var u = e;
                  for (
                    void 0 !== a ? (u = e[a] = []) : (a = "posthog"),
                      u.people = u.people || [],
                      u.toString = function (t) {
                        var e = "posthog";
                        return "posthog" !== a && (e += "." + a), t || (e += " (stub)"), e;
                      },
                      u.people.toString = function () {
                        return u.toString(1) + ".people (stub)";
                      },
                      o =
                        "init capture register register_once register_for_session unregister unregister_for_session getFeatureFlag getFeatureFlagPayload isFeatureEnabled reloadFeatureFlags updateEarlyAccessFeatureEnrollment getEarlyAccessFeatures on onFeatureFlags onSessionId getSurveys getActiveMatchingSurveys renderSurvey canRenderSurvey getNextSurveyStep identify setPersonProperties group resetGroups setPersonPropertiesForFlags resetPersonPropertiesForFlags setGroupPropertiesForFlags resetGroupPropertiesForFlags reset get_distinct_id getGroups get_session_id get_session_replay_url alias set_config startSessionRecording stopSessionRecording sessionRecordingStarted captureException loadToolbar get_property getSessionProperty createPersonProfile opt_in_capturing opt_out_capturing has_opted_in_capturing has_opted_out_capturing clear_opt_in_out_capturing debug".split(
                          " ",
                        ),
                      n = 0;
                    n < o.length;
                    n++
                  )
                    g(u, o[n]);
                  e._i.push([i, s, a]);
                }),
                (e.__SV = 1));
            })(document, window.posthog || []);
            posthog.init(${JSON.stringify(projectToken)}, {
              api_host: ${JSON.stringify(apiHost)},
              defaults: "2026-01-30",
            });
          </script>`;

          if (!html.includes("</head>")) {
            throw new Error("Could not find </head> in dist/index.html");
          }

          fs.writeFileSync(indexPath, html.replace("</head>", `${snippet}\n</head>`));
          NODE
          fi

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
