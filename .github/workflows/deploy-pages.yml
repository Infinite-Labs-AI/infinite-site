name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Prepare site
        env:
          GOOGLE_ANALYTICS_TAG_ID: ${{ vars.VITE_GOOGLE_ANALYTICS_TAG_ID }}
          META_PIXEL_ID: ${{ vars.VITE_META_PIXEL_ID }}
          POSTHOG_API_HOST: ${{ vars.VITE_POSTHOG_API_HOST }}
          POSTHOG_PROJECT_TOKEN: ${{ vars.VITE_POSTHOG_PROJECT_TOKEN }}
          X_PIXEL_ID: ${{ vars.VITE_X_PIXEL_ID }}
        run: |
          set -euo pipefail

          rm -rf dist
          mkdir -p dist
          cp -R index.html privacy terms favicon-16.png favicon-32.png apple-touch-icon.png logo.png LICENSE dist/

          node .github/scripts/inject-analytics.cjs

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
